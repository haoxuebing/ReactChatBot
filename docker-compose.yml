services:
  app:
    build:
      context: .
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-docker.m.daocloud.io}
    ports:
      - "${APP_PORT:-8080}:80"
    env_file:
      - backend/.env
    environment:
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      LLM_MODEL: ${LLM_MODEL:-deepseek-v4-flash}
    restart: unless-stopped

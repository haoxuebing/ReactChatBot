services:
  app:
    build:
      context: .
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-docker.m.daocloud.io}
    ports:
      - "${APP_PORT:-8081}:80"
    env_file:
      - backend/.env
    volumes:
      - chat_memory_data:/app/backend/data/chat_memory
    restart: unless-stopped

volumes:
  chat_memory_data:
